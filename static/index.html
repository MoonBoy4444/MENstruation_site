<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MENstruation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="site-bg"></div>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">MEN</div>
          <div>
            <h1>MENstruation</h1>
            <p>Confort adulte pour gamers</p>
          </div>
        </div>

        <nav id="nav-menu" class="nav-menu"></nav>

        <div class="sidebar-card">
          <p class="eyebrow">Collection</p>
          <h3>Slip couche, calecon couche, legging couche</h3>
          <p>Une boutique gamer adulte avec panier, commande, livraison et avis produits.</p>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Experience MENstruation</p>
            <h2 id="page-title">Accueil</h2>
          </div>
          <div class="topbar-actions">
            <div id="user-badge" class="user-badge">Visiteur</div>
          </div>
        </header>

        <section id="flash-zone"></section>
        <section id="app-view" class="view-host"></section>
      </main>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
