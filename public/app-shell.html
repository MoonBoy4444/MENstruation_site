<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MENstruation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-bg"></div>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>MENstruation</h1>
            <p>Essentiels absorbants pour adultes</p>
          </div>
        </div>

        <nav id="nav-menu" class="nav-menu"></nav>

        <div class="sidebar-card">
          <p class="eyebrow">Collection</p>
          <h3>Slip, calecon et legging absorbants</h3>
          <p>Une selection claire, des details utiles et une experience d achat sobre.</p>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Boutique</p>
            <h2 id="page-title">Accueil</h2>
          </div>
          <div class="topbar-actions">
            <div id="user-badge" class="user-badge">Visiteur</div>
          </div>
        </header>

        <section id="flash-zone"></section>
        <section id="app-view" class="view-host"></section>
      </main>
    </div>

    <script type="module" src="js/app.js"></script>
